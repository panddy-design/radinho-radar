<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Radio v10</title>
<script src="https://8x8.vc/external_api.js"></script>
<style>
body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
.card { background:#111; padding:30px; border-radius:20px; border:2px solid #28a745; width:320px; text-align:center; }
.btn { width:100%; padding:18px; margin:10px 0; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
.scout { background:#007bff; color:#fff; }
.ouvinte { background:#28a745; color:#fff; }
.unlock { background:#ffc107; color:#000; display:none; }
#jitsi-container { position:absolute; width:1px; height:1px; opacity:0; }
</style>
</head>
<body>

<div class="card">
<h2>Scout Radio v10</h2>
<div id="status">Aguardando...</div>

<div id="menu">
<button class="btn scout" onclick="conectar(true)">SCOUT (FALAR)</button>
<button class="btn ouvinte" onclick="conectar(false)">OUVINTE</button>
</div>

<button id="btnUnlock" class="btn unlock" onclick="ativarAudio()">ATIVAR ÁUDIO</button>
</div>

<div id="jitsi-container"></div>

<script>
let api;

function conectar(isScout) {
    const domain = "8x8.vc";
    const options = {
        roomName: "SALA_SCOUT_FIX_2026",
        parentNode: document.querySelector('#jitsi-container'),
        configOverwrite: {
            startWithAudioMuted: false,
            startWithVideoMuted: true,
            prejoinPageEnabled: false
        },
        interfaceConfigOverwrite: {
            DISABLE_VIDEO_BACKGROUND: true
        }
    };

    api = new JitsiMeetExternalAPI(domain, options);

    document.getElementById('menu').style.display = 'none';

    if (isScout) {
        document.getElementById('status').innerText = "Transmitindo...";
    } else {
        document.getElementById('status').innerText = "Clique para liberar áudio";
        document.getElementById('btnUnlock').style.display = 'block';
    }

    // Força volume alto
    api.addEventListener('videoConferenceJoined', () => {
        api.executeCommand('setAudioMuted', false);
    });
}

function ativarAudio() {
    if (!api) return;

    // Truque real pra autoplay policy (funciona melhor que toggle)
    api.executeCommand('setAudioMuted', false);

    // cria áudio fake pra desbloquear contexto do navegador
    const audio = new Audio();
    audio.src = "data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAA...";
    audio.play().catch(()=>{});

    document.getElementById('status').innerText = "Áudio ativo";
    document.getElementById('btnUnlock').style.display = 'none';
}
</script>

</body>
</html>
