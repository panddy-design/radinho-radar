<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Radar Pro - Voz Numeral</title>

<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background-color: #0b0b0b; color: #fff; padding: 10px; display: flex; flex-direction: column; align-items: center; width: 100%; overflow-x: hidden; }
    .app-container { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 12px; }
    .header-row { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 8px; align-items: center; width: 100%; }
    input { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; text-align: center; font-size: 14px; width: 100%; }
    .btn-header { background: none; border: none; font-size: 22px; cursor: pointer; color: #fff; padding: 5px; }
    #micBtn.active { color: #ff3b3b; text-shadow: 0 0 10px #ff3b3b; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    
    .controls { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; }
    .control-btn { padding: 8px 2px; border-radius: 15px; font-size: 11px; background: #1a1a1a; border: 1px solid #444; color: #fff; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55px; }
    .control-icon-img { width: 20px; height: 20px; object-fit: contain; margin-bottom: 3px; }
    
    .team-label { background-color: #007bff; color: #fff; padding: 5px; text-align: center; font-weight: bold; border-radius: 4px; font-size: 14px; width: 100%; text-transform: uppercase; }
    
    .radar-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }
    .radar-button { position: relative; padding-top: 18px; border-radius: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 65px; cursor: pointer; }
    .radar-icon-img { width: 24px; height: 24px; object-fit: contain; }
    .btn-label-text { position: absolute; top: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: #bbb; pointer-events: none; }
</style>
</head>
<body>

<div class="app-container">
    <div class="header-row">
        <input id="teamA" value="Casa">
        <input id="teamB" value="Fora">
        <button id="micBtn" class="btn-header" onclick="toggleVoz()">🎤</button>
        <button class="btn-header" onclick="toggleEdicao()">⚙️</button>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="limparTudo()"><img src="limpar.png" class="control-icon-img">Limpar</button>
        <button class="control-btn" onclick="desfazerUltimo()"><img src="desfazer.png" class="control-icon-img">Desfazer</button>
        <button class="control-btn" onclick="abrirJanela()"><img src="radar.png" class="control-icon-img">Radar</button>
        <button class="control-btn" onclick="addTempo()"><img src="tempo.png" class="control-icon-img">Tempo</button>
        <button class="control-btn" onclick="addSub()"><img src="sub.png" class="control-icon-img">Sub</button>
    </div>

    <div class="team-label">CASA (1)</div>
    <div class="radar-container" id="container-casa">
        <button class="radar-button" onclick="add('Meta','A')"><span class="btn-label-text">Meta</span><img src="meta.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Offside','A')"><span class="btn-label-text">Offside</span><img src="offside.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Lateral','A')"><span class="btn-label-text">Lateral</span><img src="lateral.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Canto','A')"><span class="btn-label-text">Canto</span><img src="canto.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Goleiro','A')"><span class="btn-label-text">Goleiro</span><img src="goleiro.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Defesa','A')"><span class="btn-label-text">Defesa</span><img src="defesa-casa.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Ataque','A')"><span class="btn-label-text">Ataque</span><img src="ataque-casa.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Perigoso','A')"><span class="btn-label-text">Perigoso</span><img src="perigoso-casa.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Parado','A')"><span class="btn-label-text">Parado</span><img src="parado.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Falta','A')"><span class="btn-label-text">Falta</span><img src="falta.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Penalti','A')"><span class="btn-label-text">Penalti</span><img src="penal.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Gol!','A')"><span class="btn-label-text">Gol!</span><img src="bola.png" class="radar-icon-img"></button>
    </div>

    <div class="team-label">FORA (2)</div>
    <div class="radar-container" id="container-fora">
        <button class="radar-button" onclick="add('Meta','B')"><span class="btn-label-text">Meta</span><img src="meta.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Offside','B')"><span class="btn-label-text">Offside</span><img src="offside.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Lateral','B')"><span class="btn-label-text">Lateral</span><img src="lateral.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Canto','B')"><span class="btn-label-text">Canto</span><img src="canto.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Goleiro','B')"><span class="btn-label-text">Goleiro</span><img src="goleiro.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Defesa','B')"><span class="btn-label-text">Defesa</span><img src="defesa-fora.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Ataque','B')"><span class="btn-label-text">Ataque</span><img src="ataque-fora.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Perigoso','B')"><span class="btn-label-text">Perigoso</span><img src="perigoso-fora.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Parado','B')"><span class="btn-label-text">Parado</span><img src="parado.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Falta','B')"><span class="btn-label-text">Falta</span><img src="falta.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Penalti','B')"><span class="btn-label-text">Penalti</span><img src="penal.png" class="radar-icon-img"></button>
        <button class="radar-button" onclick="add('Gol!','B')"><span class="btn-label-text">Gol!</span><img src="bola.png" class="radar-icon-img"></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyCz6YUc4GHbAHu5neKFUXOy2geO8gICUXo", authDomain: "radin-radar.firebaseapp.com", databaseURL: "https://radin-radar-default-rtdb.firebaseio.com", projectId: "radin-radar" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let gravando = false;
let recognition;
let bloqueio = false;

if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = 'pt-BR';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (event) => {
        if (bloqueio) return;
        let texto = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            texto += event.results[i][0].transcript;
        }
        analisarVoz(texto.toLowerCase());
    };

    recognition.onend = () => { if (gravando) recognition.start(); };
}

function analisarVoz(t) {
    const comandos = {
        "meta": "Meta", "lateral": "Lateral", "canto": "Canto", "escanteio": "Canto",
        "ataque": "Ataque", "perigoso": "Perigoso", "falta": "Falta", "gol": "Gol!", "pênalti": "Penalti"
    };

    for (let chave in comandos) {
        if (t.includes(chave)) {
            let time = null;
            // Verifica numeral 1 ou 2 (escrito ou dígito)
            if (t.includes(chave + " 1") || t.includes(chave + " um")) time = "A";
            else if (t.includes(chave + " 2") || t.includes(chave + " dois")) time = "B";

            if (time) {
                bloqueio = true;
                add(comandos[chave], time);
                if (navigator.vibrate) navigator.vibrate(100);
                recognition.stop();
                setTimeout(() => { bloqueio = false; }, 1200);
                break;
            }
        }
    }
}

function toggleVoz() {
    const btn = document.getElementById('micBtn');
    if (!gravando) {
        recognition.start();
        btn.classList.add('active');
        gravando = true;
    } else {
        gravando = false;
        recognition.stop();
        btn.classList.remove('active');
    }
}

function add(evento, time){
    const team = time === 'A' ? document.getElementById('teamA').value : document.getElementById('teamB').value;
    const ref = db.ref('eventos');
    ref.push({ evento, team, teamType: time, timestamp: Date.now() });
}

function limparTudo(){ if(confirm("Limpar tudo?")) db.ref('eventos').remove(); }
function desfazerUltimo(){ db.ref('eventos').orderByChild('timestamp').limitToLast(1).once('value', s => s.forEach(c => c.ref.remove())); }
function toggleEdicao() { /* ... */ }
</script>
</body>
</html>
