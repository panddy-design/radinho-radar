<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radinho Radar</title>

<style>
body {
    font-family: Arial;
    background-color: #111;
    color: #fff;
    margin: 0;
    padding: 10px;
    text-align: center;
}

.input-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: none;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.control-btn {
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

.clear { background: #e74c3c; color:#fff; }
.undo { background: #f1c40f; color:#000; }
.window { background: #2980b9; color:#fff; }
.time { background: #8e44ad; color:#fff; }

.team-label {
    margin: 10px 0 5px 0;
    font-weight: bold;
}

.radar-container {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.radar-button {
    width: 80px;
    height: 80px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-size: 12px;
    color: #fff;
    font-weight: bold;
}

.event-list {
    max-width: 400px;
    margin: 0 auto;
}

.event-card {
    display: flex;
    align-items: center;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 8px;
    background: linear-gradient(90deg, #1a1a1a, #2a2a2a);
}
</style>
</head>

<body>

<div class="input-container">
    <input id="teamA" placeholder="Casa">
    <input id="teamB" placeholder="Fora">
</div>

<div class="controls">
    <button class="control-btn clear" onclick="limparTudo()">Limpar</button>
    <button class="control-btn undo" onclick="desfazerUltimo()">Desfazer</button>
    <button class="control-btn window" onclick="abrirJanela()">Radar</button>
    <button class="control-btn time" onclick="addTempo()">Tempo</button>
</div>

<!-- CASA -->
<div class="team-label">Casa</div>
<div class="radar-container">
    <button class="radar-button" style="background:#27ae60" onclick="add('Meta','A')">Meta</button>
    <button class="radar-button" style="background:#3498db" onclick="add('Goleiro','A')">Goleiro</button>
    <button class="radar-button" style="background:#9b59b6" onclick="add('Offside','A')">Offside</button>
    <button class="radar-button" style="background:#2ecc71" onclick="add('Defesa','A')">Defesa</button>

    <button class="radar-button" style="background:#f1c40f" onclick="add('Ataque','A')">Ataque</button>
    <button class="radar-button" style="background:#e74c3c" onclick="add('Perigoso','A')">Perigoso</button>
    <button class="radar-button" style="background:#f39c12" onclick="add('Falta','A')">Falta</button>
    <button class="radar-button" style="background:#f1c40f" onclick="add('Lateral','A')">Lateral</button>

    <button class="radar-button" style="background:#16a085" onclick="add('Canto','A')">Canto</button>
    <button class="radar-button" style="background:#2ecc71" onclick="add('Gol!','A')">Gol!</button>
    <button class="radar-button" style="background:#e74c3c" onclick="add('Parado','A')">Parado</button>
    <button class="radar-button" style="background:#95a5a6" onclick="add('Substituição','A')">Sub</button>
</div>

<!-- FORA -->
<div class="team-label">Fora</div>
<div class="radar-container">
    <button class="radar-button" style="background:#27ae60" onclick="add('Meta','B')">Meta</button>
    <button class="radar-button" style="background:#3498db" onclick="add('Goleiro','B')">Goleiro</button>
    <button class="radar-button" style="background:#9b59b6" onclick="add('Offside','B')">Offside</button>
    <button class="radar-button" style="background:#2ecc71" onclick="add('Defesa','B')">Defesa</button>

    <button class="radar-button" style="background:#f1c40f" onclick="add('Ataque','B')">Ataque</button>
    <button class="radar-button" style="background:#e74c3c" onclick="add('Perigoso','B')">Perigoso</button>
    <button class="radar-button" style="background:#f39c12" onclick="add('Falta','B')">Falta</button>
    <button class="radar-button" style="background:#f1c40f" onclick="add('Lateral','B')">Lateral</button>

    <button class="radar-button" style="background:#16a085" onclick="add('Canto','B')">Canto</button>
    <button class="radar-button" style="background:#2ecc71" onclick="add('Gol!','B')">Gol!</button>
    <button class="radar-button" style="background:#e74c3c" onclick="add('Parado','B')">Parado</button>
    <button class="radar-button" style="background:#95a5a6" onclick="add('Substituição','B')">Sub</button>
</div>

<div id="eventList" class="event-list"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// CORES
const cores = {
    Meta:'#27ae60', Goleiro:'#3498db', Defesa:'#2ecc71',
    Ataque:'#f1c40f', Perigoso:'#e74c3c',
    Lateral:'#f1c40f', Falta:'#f39c12',
    'Gol!':'#2ecc71', Offside:'#9b59b6',
    Canto:'#16a085', Parado:'#e74c3c',
    'Substituição':'#95a5a6', Tempo:'#8e44ad'
};

// ÍCONES
const icones = {
    Meta:'🎯', Goleiro:'🧤', Defesa:'🛡️',
    Ataque:'⚡', Perigoso:'🔥',
    Lateral:'↔️', Falta:'🚫',
    'Gol!':'⚽', Offside:'🚩',
    Canto:'📐', Parado:'⛔',
    'Substituição':'🔄', Tempo:'⏱️'
};

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCz6YUc4GHbAHu5neKFUXOy2geO8gICUXo",
  authDomain: "radin-radar.firebaseapp.com",
  databaseURL: "https://radin-radar-default-rtdb.firebaseio.com",
  projectId: "radin-radar"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let janela = null;

// TEMPO
function addTempo(){
    db.ref('eventos').push({
        evento:'Tempo',
        team:'',
        timestamp: Date.now()
    });
}

// PARADO INTELIGENTE
function add(evento, time){
    const teamA = document.getElementById('teamA').value || "Casa";
    const teamB = document.getElementById('teamB').value || "Fora";
    const team = time === 'A' ? teamA : teamB;

    const ref = db.ref('eventos');

    if(evento !== 'Parado'){
        ref.orderByChild('team').equalTo(team).once('value', snap => {
            let ultimoParadoKey = null;
            let ultimoTempo = 0;

            snap.forEach(child => {
                const val = child.val();
                if(val.evento === 'Parado' && val.timestamp > ultimoTempo){
                    ultimoTempo = val.timestamp;
                    ultimoParadoKey = child.key;
                }
            });

            if(ultimoParadoKey){
                ref.child(ultimoParadoKey).remove();
            }

            enviar();
        });
    } else {
        enviar();
    }

    function enviar(){
        ref.push({
            evento,
            team,
            timestamp: Date.now()
        });
    }
}

// LISTA + ÍCONES
db.ref('eventos').on('value', snap => {
    const data = snap.val();
    const list = document.getElementById('eventList');
    list.innerHTML = '';

    for (let k in data){
        const e = data[k];

        const texto = e.evento === 'Tempo'
            ? 'Tempo'
            : `${e.evento} ${e.team}`;

        const div = document.createElement('div');
        div.className = 'event-card';

        div.innerHTML = `
            <div style="width:25px;text-align:center;margin-right:8px;color:${cores[e.evento]};font-size:16px;">
                ${icones[e.evento] || '•'}
            </div>
            ${texto}
        `;

        list.prepend(div);
    }

    atualizarJanela();
});

// JANELA
function abrirJanela(){
    if(!janela || janela.closed){
        janela = window.open("", "Radar", "width=320,height=500");

        janela.document.write(`
            <html>
            <head>
            <style>
                body{background:#111;color:#fff;font-family:Arial;padding:10px;}
                .event-card{display:flex;align-items:center;padding:8px;margin-bottom:8px;border-radius:8px;background:linear-gradient(90deg,#1a1a1a,#2a2a2a);}
            </style>
            </head>
            <body>
                <h3 style="text-align:center;">Radar</h3>
                <div id="lista"></div>
            </body>
            </html>
        `);
    }
    atualizarJanela();
}

function atualizarJanela(){
    if(janela && !janela.closed){
        const lista = janela.document.getElementById('lista');
        lista.innerHTML = document.getElementById('eventList').innerHTML;
    }
}

// CONTROLES
function limparTudo(){
    db.ref('eventos').remove();
}

function desfazerUltimo(){
    db.ref('eventos').orderByChild('timestamp').limitToLast(1).once('value', snap=>{
        snap.forEach(child=>{
            child.ref.remove();
        });
    });
}
</script>

</body>
</html>
