<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radinho Radar Pro</title>

<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    
    body {
        font-family: sans-serif;
        background-color: #0b0b0b;
        color: #fff;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
    }

    .app-container {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    /* TOPO EM UMA LINHA: INPUTS + ENGRENAGEM */
    .header-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        align-items: center;
        width: 100%;
    }

    input {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
        text-align: center;
        font-size: 14px;
        width: 100%;
    }

    .btn-config {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #fff;
        display: flex;
        align-items: center;
    }

    /* CONTROLES SUPERIORES */
    .controls {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
    }
    .control-btn {
        padding: 6px 2px;
        border-radius: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 50px;
    }
    .control-btn span { font-size: 9px; font-weight: bold; margin-top: 3px; }
    .control-icon-img { width: 20px; height: 20px; object-fit: contain; }

    /* RÓTULOS CASA/FORA */
    .team-label {
        background-color: #007bff;
        color: #fff;
        padding: 5px; /* Ajustado para 5px */
        text-align: center;
        font-weight: bold;
        border-radius: 4px;
        font-size: 14px;
        text-transform: uppercase;
    }

    /* GRADE RADAR */
    .radar-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    .radar-button {
        aspect-ratio: 1 / 1;
        border-radius: 10px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        padding: 5px;
    }

    .radar-button.editando { border: 2px dashed #007bff !important; }

    .btn-icon-img {
        width: 35px;
        height: 35px;
        object-fit: contain;
        margin-top: 10px;
    }

    .btn-text {
        position: absolute;
        top: 5px;
        font-size: 10px; /* Ajustado para 10px */
        text-transform: uppercase;
        color: #bbb;
    }

    .event-list { width: 100%; margin-top: 10px; }
    .event-card {
        display: flex;
        align-items: center;
        padding: 10px;
        margin-bottom: 6px;
        border-radius: 8px;
        background: #161616;
        border: 1px solid #222;
    }
    .radar-list-img { width: 18px; height: 18px; margin-right: 10px; }
</style>
</head>
<body>

<div class="app-container">
    
    <div class="header-row">
        <input id="teamA" value="Casa">
        <input id="teamB" value="Fora">
        <button class="btn-config" onclick="toggleEdicao()">⚙️</button>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="limparTudo()"><img src="limpar.png" class="control-icon-img"><span>Limpar</span></button>
        <button class="control-btn" onclick="desfazerUltimo()"><img src="desfazer.png" class="control-icon-img"><span>Desfazer</span></button>
        <button class="control-btn" onclick="abrirJanela()"><img src="radar.png" class="control-icon-img"><span>Radar</span></button>
        <button class="control-btn" onclick="addTempo()"><img src="tempo.png" class="control-icon-img"><span>Tempo</span></button>
        <button class="control-btn" onclick="addSub()"><img src="sub.png" class="control-icon-img"><span>Sub</span></button>
    </div>

    <div class="team-label">CASA</div>
    <div class="radar-container" id="container-casa">
        <button class="radar-button" onclick="add('Meta','A')"><span class="btn-text">Meta</span><img src="meta.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Offside','A')"><span class="btn-text">Offside</span><img src="offside.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Lateral','A')"><span class="btn-text">Lateral</span><img src="lateral.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Canto','A')"><span class="btn-text">Canto</span><img src="canto.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Goleiro','A')"><span class="btn-text">Goleiro</span><img src="goleiro.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Defesa','A')"><span class="btn-text">Defesa</span><img src="defesa-casa.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Ataque','A')"><span class="btn-text">Ataque</span><img src="ataque-casa.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Perigoso','A')"><span class="btn-text">Perigoso</span><img src="perigoso-casa.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Parado','A')"><span class="btn-text">Parado</span><img src="parado.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Falta','A')"><span class="btn-text">Falta</span><img src="falta.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Penalti','A')"><span class="btn-text">Penalti</span><img src="penal.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Gol!','A')"><span class="btn-text">Gol!</span><img src="bola.png" class="btn-icon-img"></button>
    </div>

    <div class="team-label">FORA</div>
    <div class="radar-container" id="container-fora">
        <button class="radar-button" onclick="add('Meta','B')"><span class="btn-text">Meta</span><img src="meta.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Offside','B')"><span class="btn-text">Offside</span><img src="offside.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Lateral','B')"><span class="btn-text">Lateral</span><img src="lateral.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Canto','B')"><span class="btn-text">Canto</span><img src="canto.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Goleiro','B')"><span class="btn-text">Goleiro</span><img src="goleiro.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Defesa','B')"><span class="btn-text">Defesa</span><img src="defesa-fora.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Ataque','B')"><span class="btn-text">Ataque</span><img src="ataque-fora.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Perigoso','B')"><span class="btn-text">Perigoso</span><img src="perigoso-fora.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Parado','B')"><span class="btn-text">Parado</span><img src="parado.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Falta','B')"><span class="btn-text">Falta</span><img src="falta.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Penalti','B')"><span class="btn-text">Penalti</span><img src="penal.png" class="btn-icon-img"></button>
        <button class="radar-button" onclick="add('Gol!','B')"><span class="btn-text">Gol!</span><img src="bola.png" class="btn-icon-img"></button>
    </div>

    <div id="eventList" class="event-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyCz6YUc4GHbAHu5neKFUXOy2geO8gICUXo", authDomain: "radin-radar.firebaseapp.com", databaseURL: "https://radin-radar-default-rtdb.firebaseio.com", projectId: "radin-radar" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const iconesBase = { Meta:'meta.png', Offside:'offside.png', Lateral:'lateral.png', Canto:'canto.png', Goleiro:'goleiro.png', Parado:'parado.png', Falta:'falta.png', Penalti:'penal.png', 'Gol!':'bola.png', Tempo:'tempo.png', Substituição: 'sub.png' };

let editMode = false;
let janelaRadar = null;

function toggleEdicao() {
    editMode = !editMode;
    document.querySelectorAll('.radar-button').forEach(btn => {
        btn.classList.toggle('editando', editMode);
    });
}

function add(evento, time){
    if(editMode) return;
    const team = time === 'A' ? document.getElementById('teamA').value : document.getElementById('teamB').value;
    const ref = db.ref('eventos');
    if(evento !== 'Parado'){
        ref.orderByChild('teamType').equalTo(time).once('value', snap => {
            snap.forEach(c => { if(c.val().evento === 'Parado') c.ref.remove(); });
            ref.push({ evento, team, teamType: time, timestamp: Date.now() });
        });
    } else { ref.push({ evento, team, teamType: time, timestamp: Date.now() }); }
}

function addTempo() { db.ref('eventos').push({ evento: 'Tempo', team: '', teamType: '', timestamp: Date.now() }); }
function addSub() { db.ref('eventos').push({ evento: 'Substituição', team: '', teamType: '', timestamp: Date.now() }); }

db.ref('eventos').on('value', snap => {
    const list = document.getElementById('eventList');
    list.innerHTML = '';
    const data = snap.val();
    if (data) {
        for (let k in data){
            const e = data[k];
            const div = document.createElement('div');
            div.className = 'event-card';
            let img = iconesBase[e.evento];
            if(['Defesa', 'Ataque', 'Perigoso'].includes(e.evento)) img = e.evento.toLowerCase() + (e.teamType === 'A' ? '-casa.png' : '-fora.png');
            div.innerHTML = `<img src="${img}" class="radar-list-img"> ${ (e.evento==='Tempo'||e.evento==='Substituição') ? e.evento : e.evento+' '+e.team }`;
            list.prepend(div);
        }
    }
    if(janelaRadar && !janelaRadar.closed) atualizarJanelaExterna();
});

function abrirJanela(){
    if(!janelaRadar || janelaRadar.closed){
        janelaRadar = window.open("", "RadarWindow", "width=350,height=600");
        janelaRadar.document.write(`
            <html>
            <head>
                <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
                <style>
                    html, body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; margin: 0; overflow: hidden; height: 100%; }
                    #lista-externa { height: 100%; overflow-y: scroll; scrollbar-width: none; }
                    #lista-externa::-webkit-scrollbar { display: none; }
                    .event-card { display: flex; align-items: center; padding: 12px; margin-bottom: 5px; border-radius: 8px; background: #111; border: 1px solid #333; font-size: 14px; }
                    .radar-list-img { width: 18px; height: 18px; margin-right: 10px; }
                </style>
            </head>
            <body><div id="lista-externa"></div></body>
            </html>
        `);
        janelaRadar.document.close();
    }
    setTimeout(atualizarJanelaExterna, 500);
}

function atualizarJanelaExterna(){
    if(janelaRadar && !janelaRadar.closed) {
        janelaRadar.document.getElementById('lista-externa').innerHTML = document.getElementById('eventList').innerHTML;
    }
}

function limparTudo(){ db.ref('eventos').remove(); }
function desfazerUltimo(){ db.ref('eventos').orderByChild('timestamp').limitToLast(1).once('value', s => s.forEach(c => c.ref.remove())); }
</script>

</body>
</html>
