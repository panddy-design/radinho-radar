<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scout Radio v9.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://8x8.vc/external_api.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #111; padding: 40px; border-radius: 30px; border: 2px solid #28a745; width: 340px; text-align: center; }
        .btn { width: 100%; padding: 22px; margin: 12px 0; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .scout { background: #007bff; color: white; }
        .ouvinte { background: #28a745; color: white; }
        
        /* BOTÃO DE DESTRAVAR SOM - O MAIS IMPORTANTE */
        .unlock-audio { 
            background: #ffc107; 
            color: #000; 
            display: none; 
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
        }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #status { color: #aaa; margin-bottom: 25px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        #jitsi-container { position: absolute; top: -9999px; left: -9999px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="margin-bottom:10px;">Scout Radio</h2>
        <div id="status">Aguardando comando...</div>

        <div id="menu-inicial">
            <button class="btn scout" onclick="conectar(true)">SOU O SCOUT (FALAR)</button>
            <button class="btn ouvinte" onclick="conectar(false)">SOU OUVINTE (OUVIR)</button>
        </div>

        <button id="btnUnlock" class="btn unlock-audio" onclick="desbloquear()">ATIVAR SOM DO SCOUT</button>

        <button class="btn" style="background:transparent; color:#444; font-size:12px; margin-top:20px;" onclick="location.reload()">REINICIAR PÁGINA</button>
    </div>

    <div id="jitsi-container"></div>

    <script>
        let api = null;

        function conectar(isScout) {
            const options = {
                roomName: "SALA_EXCLUSIVA_SCOUT_9988", 
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: {
                    startWithAudioMuted: !isScout,
                    startWithVideoMuted: true,
                    prejoinPageEnabled: false
                }
            };

            api = new JitsiMeetExternalAPI("8x8.vc", options);

            document.getElementById('menu-inicial').style.display = 'none';
            document.getElementById('status').innerText = isScout ? "TRANSMITINDO AO VIVO" : "CONECTADO À SALA";

            if (!isScout) {
                // Para o ouvinte, mostramos o botão de destravar o áudio após 2 segundos
                setTimeout(() => {
                    document.getElementById('btnUnlock').style.display = 'block';
                    document.getElementById('status').innerText = "CLIQUE NO BOTÃO AMARELO";
                }, 2000);
            }
        }

        // Função crucial: interage com a API e com o hardware de áudio ao mesmo tempo
        function desbloquear() {
            if (api) {
                // Tenta forçar o navegador a liberar o áudio através de um comando de toggle
                api.executeCommand('toggleAudio');
                setTimeout(() => {
                    api.executeCommand('toggleAudio');
                    document.getElementById('btnUnlock').innerText = "ÁUDIO LIBERADO!";
                    document.getElementById('btnUnlock').style.background = "#28a745";
                    document.getElementById('btnUnlock').style.color = "white";
                    document.getElementById('status').innerText = "RECEPÇÃO ATIVA";
                }, 300);
            }
        }
    </script>
</body>
</html>
