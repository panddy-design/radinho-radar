<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radinho Radar</title>

<style>
body {
    font-family: Arial;
    background-color: #111;
    color: #fff;
    margin: 0;
    padding: 10px;
    text-align: center;
}

/* ESTILO DA ENGRENAGEM */
.config-container {
    display: flex;
    justify-content: flex-end;
    padding: 5px;
}
.btn-engrenagem {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    transition: transform 0.3s;
}
.btn-engrenagem:hover { transform: rotate(45deg); }

/* INPUTS NO TOPO */
.input-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
}

/* ESTILO PADRÃO DE BOTÕES */
.btn-estilo-padrao {
    background: linear-gradient(90deg, #1a1a1a, #2a2a2a);
    border: 1px solid #444;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.2s;
}

.btn-estilo-padrao:hover {
    opacity: 0.8;
}

/* CONTROLES SUPERIORES */
.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.control-btn {
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
}

/* BOTÕES DO RADAR */
.team-label {
    margin: 10px 0 5px 0;
    font-weight: bold;
    color: #aaa;
}

.radar-container {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.radar-button {
    width: 80px;
    height: 80px;
    border-radius: 14px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.btn-icon {
    font-size: 32px;
    pointer-events: none;
    margin-top: 10px;
}

.btn-text {
    position: absolute;
    top: 5px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 9px;
    text-transform: uppercase;
    color: #bbb;
    pointer-events: none;
    letter-spacing: 0.5px;
}

.radar-button.editando {
    border: 2px dashed #007bff !important;
    opacity: 0.8;
    cursor: grab;
}

.event-list {
    max-width: 400px;
    margin: 20px auto;
}

.event-card {
    display: flex;
    align-items: center;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 8px;
    background: linear-gradient(90deg, #1a1a1a, #2a2a2a);
    border: 1px solid #333;
}
</style>
</head>

<body>

<div class="config-container">
    <button class="btn-engrenagem" onclick="toggleEdicao()" title="Mudar botões de lugar">⚙️</button>
</div>

<div class="input-container">
    <input id="teamA" placeholder="Casa">
    <input id="teamB" placeholder="Fora">
</div>

<div class="controls">
    <button class="control-btn btn-estilo-padrao" onclick="limparTudo()">Limpar</button>
    <button class="control-btn btn-estilo-padrao" onclick="desfazerUltimo()">Desfazer</button>
    <button class="control-btn btn-estilo-padrao" onclick="abrirJanela()">Radar</button>
    <button class="control-btn btn-estilo-padrao" onclick="addTempo()">Tempo</button>
</div>

<div class="team-label">Casa</div>
<div class="radar-container" id="container-casa">
    <button class="radar-button btn-estilo-padrao" onclick="add('Meta','A')"><span class="btn-text">Meta</span><span class="btn-icon">🎯</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Offside','A')"><span class="btn-text">Offside</span><span class="btn-icon">🚩</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Lateral','A')"><span class="btn-text">Lateral</span><span class="btn-icon">↔️</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Canto','A')"><span class="btn-text">Canto</span><span class="btn-icon">📐</span></button>
    
    <button class="radar-button btn-estilo-padrao" onclick="add('Goleiro','A')"><span class="btn-text">Goleiro</span><span class="btn-icon">🧤</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Defesa','A')"><span class="btn-text">Defesa</span><span class="btn-icon">🛡️</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Ataque','A')"><span class="btn-text">Ataque</span><span class="btn-icon">⚡</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Perigoso','A')"><span class="btn-text">Perigoso</span><span class="btn-icon">🔥</span></button>
    
    <button class="radar-button btn-estilo-padrao" onclick="add('Parado','A')"><span class="btn-text">Parado</span><span class="btn-icon">⛔</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Substituição','A')"><span class="btn-text">Sub</span><span class="btn-icon">🔄</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Falta','A')"><span class="btn-text">Falta</span><span class="btn-icon">🚫</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Gol!','A')"><span class="btn-text">Gol!</span><span class="btn-icon">⚽</span></button>
</div>

<div class="team-label">Fora</div>
<div class="radar-container" id="container-fora">
    <button class="radar-button btn-estilo-padrao" onclick="add('Meta','B')"><span class="btn-text">Meta</span><span class="btn-icon">🎯</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Offside','B')"><span class="btn-text">Offside</span><span class="btn-icon">🚩</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Lateral','B')"><span class="btn-text">Lateral</span><span class="btn-icon">↔️</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Canto','B')"><span class="btn-text">Canto</span><span class="btn-icon">📐</span></button>
    
    <button class="radar-button btn-estilo-padrao" onclick="add('Goleiro','B')"><span class="btn-text">Goleiro</span><span class="btn-icon">🧤</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Defesa','B')"><span class="btn-text">Defesa</span><span class="btn-icon">🛡️</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Ataque','B')"><span class="btn-text">Ataque</span><span class="btn-icon">⚡</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Perigoso','B')"><span class="btn-text">Perigoso</span><span class="btn-icon">🔥</span></button>
    
    <button class="radar-button btn-estilo-padrao" onclick="add('Parado','B')"><span class="btn-text">Parado</span><span class="btn-icon">⛔</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Substituição','B')"><span class="btn-text">Sub</span><span class="btn-icon">🔄</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Falta','B')"><span class="btn-text">Falta</span><span class="btn-icon">🚫</span></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Gol!','B')"><span class="btn-text">Gol!</span><span class="btn-icon">⚽</span></button>
</div>

<div id="eventList" class="event-list"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- FUNÇÃO DE MUDAR POSIÇÃO ---
let editMode = false;
let draggedItem = null;

function toggleEdicao() {
    editMode = !editMode;
    const buttons = document.querySelectorAll('.radar-button');
    buttons.forEach(btn => {
        if (editMode) {
            btn.classList.add('editando');
            btn.setAttribute('draggable', 'true');
        } else {
            btn.classList.remove('editando');
            btn.setAttribute('draggable', 'false');
        }
    });
}

document.querySelectorAll('.radar-container').forEach(container => {
    container.addEventListener('dragstart', e => {
        if (!editMode) return;
        draggedItem = e.currentTarget === e.target ? e.target : e.target.closest('.radar-button');
        if(!draggedItem) return;
        setTimeout(() => draggedItem.style.opacity = '0.5', 0);
    });

    container.addEventListener('dragend', e => {
        if (!editMode || !draggedItem) return;
        draggedItem.style.opacity = '1';
    });

    container.addEventListener('dragover', e => {
        if (!editMode) return;
        e.preventDefault();
        const afterElement = getDragAfterElement(container, e.clientX, e.clientY);
        if (afterElement == null) {
            container.appendChild(draggedItem);
        } else {
            container.insertBefore(draggedItem, afterElement);
        }
    });
});

function getDragAfterElement(container, x, y) {
    const draggableElements = [...container.querySelectorAll('.radar-button:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offsetX = x - box.left - box.width / 2;
        const offsetY = y - box.top - box.height / 2;
        if (Math.abs(offsetX) < 50 && Math.abs(offsetY) < 50) {
            return child;
        } else {
            return closest;
        }
    }, null);
}

// --- LÓGICA ORIGINAL FIREBASE ---

const cores = {
    Meta:'#27ae60', Goleiro:'#3498db', Defesa:'#2ecc71',
    Ataque:'#f1c40f', Perigoso:'#e74c3c',
    Lateral:'#f1c40f', Falta:'#f39c12',
    'Gol!':'#2ecc71', Offside:'#9b59b6',
    Canto:'#16a085', Parado:'#e74c3c',
    'Substituição':'#95a5a6', Tempo:'#8e44ad'
};

const icones = {
    Meta:'🎯', Goleiro:'🧤', Defesa:'🛡️',
    Ataque:'⚡', Perigoso:'🔥',
    Lateral:'↔️', Falta:'🚫',
    'Gol!':'⚽', Offside:'🚩',
    Canto:'📐', Parado:'⛔',
    'Substituição':'🔄', Tempo:'⏱️'
};

const firebaseConfig = {
  apiKey: "AIzaSyCz6YUc4GHbAHu5neKFUXOy2geO8gICUXo",
  authDomain: "radin-radar.firebaseapp.com",
  databaseURL: "https://radin-radar-default-rtdb.firebaseio.com",
  projectId: "radin-radar"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let janela = null;

function addTempo(){
    db.ref('eventos').push({
        evento:'Tempo',
        team:'',
        timestamp: Date.now()
    });
}

function add(evento, time){
    if(editMode) return;

    const teamA = document.getElementById('teamA').value || "Casa";
    const teamB = document.getElementById('teamB').value || "Fora";
    const team = time === 'A' ? teamA : teamB;

    const ref = db.ref('eventos');

    if(evento !== 'Parado'){
        ref.orderByChild('team').equalTo(team).once('value', snap => {
            let ultimoParadoKey = null;
            let ultimoTempo = 0;

            snap.forEach(child => {
                const val = child.val();
                if(val.evento === 'Parado' && val.timestamp > ultimoTempo){
                    ultimoTempo = val.timestamp;
                    ultimoParadoKey = child.key;
                }
            });

            if(ultimoParadoKey){
                ref.child(ultimoParadoKey).remove();
            }

            enviar();
        });
    } else {
        enviar();
    }

    function enviar(){
        ref.push({
            evento,
            team,
            timestamp: Date.now()
        });
    }
}

db.ref('eventos').on('value', snap => {
    const data = snap.val();
    const list = document.getElementById('eventList');
    list.innerHTML = '';

    for (let k in data){
        const e = data[k];

        const texto = e.evento === 'Tempo'
            ? 'Tempo'
            : `${e.evento} ${e.team}`;

        const div = document.createElement('div');
        div.className = 'event-card';

        div.innerHTML = `
            <div style="width:25px;text-align:center;margin-right:8px;color:${cores[e.evento]};font-size:16px;">
                ${icones[e.evento] || '•'}
            </div>
            ${texto}
        `;

        list.prepend(div);
    }

    atualizarJanela();
});

function abrirJanela(){
    if(!janela || janela.closed){
        janela = window.open("", "Radar", "width=320,height=500");

        janela.document.write(`
            <html>
            <head>
            <style>
                body{background:#111;color:#fff;font-family:Arial;padding:10px;}
                .event-card{display:flex;align-items:center;padding:8px;margin-bottom:8px;border-radius:8px;background:linear-gradient(90deg,#1a1a1a,#2a2a2a);}
            </style>
            </head>
            <body>
                <div id="lista"></div>
            </body>
            </html>
        `);
    }
    atualizarJanela();
}

function atualizarJanela(){
    if(janela && !janela.closed){
        const lista = janela.document.getElementById('lista');
        lista.innerHTML = document.getElementById('eventList').innerHTML;
    }
}

function limparTudo(){
    db.ref('eventos').remove();
}

function desfazerUltimo(){
    db.ref('eventos').orderByChild('timestamp').limitToLast(1).once('value', snap=>{
        snap.forEach(child=>{
            child.ref.remove();
        });
    });
}
</script>

</body>
</html>
