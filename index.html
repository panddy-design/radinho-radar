<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radinho Radar Pro - Final</title>

<style>
    /* RESET E TRAVA DE MARGEM */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    
    body {
        font-family: Arial, sans-serif;
        background-color: #0b0b0b;
        color: #fff;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        width: 100%;
    }

    /* CONTAINER PADRÃO - SEGURA AS MARGENS IGUAIS PARA TUDO */
    .app-container {
        width: 100%;
        max-width: 380px; /* Largura que você aprovou para alinhar as margens */
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    /* HEADER ALINHADO */
    .header-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
        align-items: center;
        width: 100%;
    }

    input {
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #444;
        background: #222;
        color: #fff;
        text-align: center;
        font-size: 14px;
        width: 100%;
    }

    /* BOTÃO CONFIG */
    .btn-config {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #fff;
        display: flex;
        align-items: center;
    }

    /* CONTROLES E RADAR PADRONIZADOS */
    .controls {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
        width: 100%;
    }

    .radar-container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        width: 100%;
    }

    /* ESTILO ÚNICO PARA TODOS OS BOTÕES */
    .control-btn, .radar-button {
        padding: 8px 2px;
        border-radius: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 55px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
    }

    .control-btn:active, .radar-button:active { background: #333; }

    /* RÓTULOS AZUIS PADRÃO */
    .team-label {
        background-color: #007bff;
        color: #fff;
        padding: 5px;
        text-align: center;
        font-weight: bold;
        border-radius: 4px;
        font-size: 14px;
        width: 100%;
    }

    /* ÍCONES PADRONIZADOS 22px */
    .icon-img {
        width: 22px;
        height: 22px;
        object-fit: contain;
    }

    /* TEXTO PADRONIZADO 10px */
    .btn-label-text {
        font-size: 10px;
        font-weight: bold;
        margin-top: 4px;
        text-transform: uppercase;
        color: #bbb;
        pointer-events: none;
    }

    /* ESTILO DE AJUSTE */
    .radar-button.editando {
        border: 2px dashed #007bff !important;
        opacity: 0.7;
    }

    /* LISTA DE EVENTOS */
    .event-list { width: 100%; margin-top: 10px; }
    .event-card {
        display: flex;
        align-items: center;
        padding: 10px;
        margin-bottom: 6px;
        border-radius: 8px;
        background: #161616;
        border: 1px solid #222;
        font-size: 14px;
    }
    .radar-list-img { width: 18px; height: 18px; margin-right: 10px; }
</style>
</head>
<body>

<div class="app-container">
    
    <div class="header-row">
        <input id="teamA" value="Casa">
        <input id="teamB" value="Fora">
        <button class="btn-config" onclick="toggleEdicao()">⚙️</button>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="limparTudo()"><img src="limpar.png" class="icon-img"><span class="btn-label-text">Limpar</span></button>
        <button class="control-btn" onclick="desfazerUltimo()"><img src="desfazer.png" class="icon-img"><span class="btn-label-text">Desfazer</span></button>
        <button class="control-btn" onclick="abrirJanela()"><img src="radar.png" class="icon-img"><span class="btn-label-text">Radar</span></button>
        <button class="control-btn" onclick="addTempo()"><img src="tempo.png" class="icon-img"><span class="btn-label-text">Tempo</span></button>
        <button class="control-btn" onclick="addSub()"><img src="sub.png" class="icon-img"><span class="btn-label-text">Sub</span></button>
    </div>

    <div class="team-label">CASA</div>
    <div class="radar-container" id="container-casa">
        <button class="radar-button" onclick="add('Meta','A')"><img src="meta.png" class="icon-img"><span class="btn-label-text">Meta</span></button>
        <button class="radar-button" onclick="add('Offside','A')"><img src="offside.png" class="icon-img"><span class="btn-label-text">Offside</span></button>
        <button class="radar-button" onclick="add('Lateral','A')"><img src="lateral.png" class="icon-img"><span class="btn-label-text">Lateral</span></button>
        <button class="radar-button" onclick="add('Canto','A')"><img src="canto.png" class="icon-img"><span class="btn-label-text">Canto</span></button>
        <button class="radar-button" onclick="add('Goleiro','A')"><img src="goleiro.png" class="icon-img"><span class="btn-label-text">Goleiro</span></button>
        <button class="radar-button" onclick="add('Defesa','A')"><img src="defesa-casa.png" class="icon-img"><span class="btn-label-text">Defesa</span></button>
        <button class="radar-button" onclick="add('Ataque','A')"><img src="ataque-casa.png" class="icon-img"><span class="btn-label-text">Ataque</span></button>
        <button class="radar-button" onclick="add('Perigoso','A')"><img src="perigoso-casa.png" class="icon-img"><span class="btn-label-text">Perigoso</span></button>
        <button class="radar-button" onclick="add('Parado','A')"><img src="parado.png" class="icon-img"><span class="btn-label-text">Parado</span></button>
        <button class="radar-button" onclick="add('Falta','A')"><img src="falta.png" class="icon-img"><span class="btn-label-text">Falta</span></button>
        <button class="radar-button" onclick="add('Penalti','A')"><img src="penal.png" class="icon-img"><span class="btn-label-text">Penalti</span></button>
        <button class="radar-button" onclick="add('Gol!','A')"><img src="bola.png" class="icon-img"><span class="btn-label-text">Gol!</span></button>
    </div>

    <div class="team-label">FORA</div>
    <div class="radar-container" id="container-fora">
        <button class="radar-button" onclick="add('Meta','B')"><img src="meta.png" class="icon-img"><span class="btn-label-text">Meta</span></button>
        <button class="radar-button" onclick="add('Offside','B')"><img src="offside.png" class="icon-img"><span class="btn-label-text">Offside</span></button>
        <button class="radar-button" onclick="add('Lateral','B')"><img src="lateral.png" class="icon-img"><span class="btn-label-text">Lateral</span></button>
        <button class="radar-button" onclick="add('Canto','B')"><img src="canto.png" class="icon-img"><span class="btn-label-text">Canto</span></button>
        <button class="radar-button" onclick="add('Goleiro','B')"><img src="goleiro.png" class="icon-img"><span class="btn-label-text">Goleiro</span></button>
        <button class="radar-button" onclick="add('Defesa','B')"><img src="defesa-fora.png" class="icon-img"><span class="btn-label-text">Defesa</span></button>
        <button class="radar-button" onclick="add('Ataque','B')"><img src="ataque-fora.png" class="icon-img"><span class="btn-label-text">Ataque</span></button>
        <button class="radar-button" onclick="add('Perigoso','B')"><img src="perigoso-fora.png" class="icon-img"><span class="btn-label-text">Perigoso</span></button>
        <button class="radar-button" onclick="add('Parado','B')"><img src="parado.png" class="icon-img"><span class="btn-label-text">Parado</span></button>
        <button class="radar-button" onclick="add('Falta','B')"><img src="falta.png" class="icon-img"><span class="btn-label-text">Falta</span></button>
        <button class="radar-button" onclick="add('Penalti','B')"><img src="penal.png" class="icon-img"><span class="btn-label-text">Penalti</span></button>
        <button class="radar-button" onclick="add('Gol!','B')"><img src="bola.png" class="icon-img"><span class="btn-label-text">Gol!</span></button>
    </div>

    <div id="eventList" class="event-list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = { apiKey: "AIzaSyCz6YUc4GHbAHu5neKFUXOy2geO8gICUXo", authDomain: "radin-radar.firebaseapp.com", databaseURL: "https://radin-radar-default-rtdb.firebaseio.com", projectId: "radin-radar" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const iconesBase = { Meta:'meta.png', Offside:'offside.png', Lateral:'lateral.png', Canto:'canto.png', Goleiro:'goleiro.png', Parado:'parado.png', Falta:'falta.png', Penalti:'penal.png', 'Gol!':'bola.png', Tempo:'tempo.png', Substituição: 'sub.png' };

let editMode = false;
let janelaRadar = null;

function toggleEdicao() {
    editMode = !editMode;
    document.querySelectorAll('.radar-button').forEach(btn => {
        btn.classList.toggle('editando', editMode);
    });
}

function add(evento, time){
    if(editMode) return;
    const team = time === 'A' ? document.getElementById('teamA').value : document.getElementById('teamB').value;
    const ref = db.ref('eventos');
    if(evento !== 'Parado'){
        ref.orderByChild('teamType').equalTo(time).once('value', snap => {
            snap.forEach(c => { if(c.val().evento === 'Parado') c.ref.remove(); });
            ref.push({ evento, team, teamType: time, timestamp: Date.now() });
        });
    } else { ref.push({ evento, team, teamType: time, timestamp: Date.now() }); }
}

function addTempo() { db.ref('eventos').push({ evento: 'Tempo', team: '', teamType: '', timestamp: Date.now() }); }
function addSub() { db.ref('eventos').push({ evento: 'Substituição', team: '', teamType: '', timestamp: Date.now() }); }

db.ref('eventos').on('value', snap => {
    const list = document.getElementById('eventList');
    list.innerHTML = '';
    const data = snap.val();
    if (data) {
        for (let k in data){
            const e = data[k];
            const div = document.createElement('div');
            div.className = 'event-card';
            let img = iconesBase[e.evento];
            if(['Defesa', 'Ataque', 'Perigoso'].includes(e.evento)) img = e.evento.toLowerCase() + (e.teamType === 'A' ? '-casa.png' : '-fora.png');
            div.innerHTML = `<img src="${img}" class="radar-list-img"> ${ (e.evento==='Tempo'||e.evento==='Substituição') ? e.evento : e.evento+' '+e.team }`;
            list.prepend(div);
        }
    }
    if(janelaRadar && !janelaRadar.closed) atualizarJanelaExterna();
});

function abrirJanela(){
    if(!janelaRadar || janelaRadar.closed){
        janelaRadar = window.open("", "RadarWindow", "width=350,height=600");
        janelaRadar.document.write(`<html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>html, body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; margin: 0; overflow: hidden; height: 100%; } #lista-externa { height: 100%; overflow-y: scroll; scrollbar-width: none; } #lista-externa::-webkit-scrollbar { display: none; } .event-card { display: flex; align-items: center; padding: 12px; margin-bottom: 5px; border-radius: 8px; background: #111; border: 1px solid #333; font-size: 14px; } .radar-list-img { width: 18px; height: 18px; margin-right: 10px; }</style></head><body><div id="lista-externa"></div></body></html>`);
        janelaRadar.document.close();
    }
    setTimeout(atualizarJanelaExterna, 500);
}

function atualizarJanelaExterna(){
    if(janelaRadar && !janelaRadar.closed) {
        janelaRadar.document.getElementById('lista-externa').innerHTML = document.getElementById('eventList').innerHTML;
    }
}

function limparTudo(){ db.ref('eventos').remove(); }
function desfazerUltimo(){ db.ref('eventos').orderByChild('timestamp').limitToLast(1).once('value', s => s.forEach(c => c.ref.remove())); }
</script>

</body>
</html>
