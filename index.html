<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scout Radio App</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://8x8.vc/external_api.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .app-card { background: #111; padding: 40px; border-radius: 30px; border: 1px solid #007bff; width: 320px; text-align: center; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .scout { background: #007bff; color: white; }
        .ouvinte { background: #28a745; color: white; }
        #status { color: #ffcc00; margin-bottom: 20px; font-size: 14px; }
        #jitsi-container { display: none; }
    </style>
</head>
<body>

    <div class="app-card">
        <h2>SCOUT APP v8.0</h2>
        <div id="status">AGUARDANDO CONEXÃO</div>

        <button class="btn scout" onclick="conectar(true)">TRANSMITIR AGORA</button>
        <button class="btn ouvinte" onclick="conectar(false)">OUVIR RÁDIO</button>
        
        <button class="btn" style="background:#222; color:#555; font-size:10px;" onclick="location.reload()">RESETAR APP</button>
    </div>

    <div id="jitsi-container"></div>

    <script>
        // REGISTRA O SERVICE WORKER (Transforma em App)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let api = null;

        function conectar(isScout) {
            const options = {
                roomName: "RADIO_SCOUT_PRIVATE_ROOM_99",
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: {
                    startWithAudioMuted: !isScout,
                    startWithVideoMuted: true,
                    prejoinPageEnabled: false
                }
            };
            api = new JitsiMeetExternalAPI("8x8.vc", options);
            document.getElementById('status').innerText = isScout ? "VOCÊ ESTÁ AO VIVO" : "OUVINDO SCOUT...";
            
            // Se for ouvinte, alerta para garantir foco no áudio
            if(!isScout) {
                setTimeout(() => { alert("Áudio conectado! Se estiver mudo, aumente o volume de 'Mídia' do celular."); }, 1500);
            }
        }
    </script>
</body>
</html>
