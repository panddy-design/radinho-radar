<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radinho Radar</title>

<style>
body {
    font-family: Arial;
    background-color: #111;
    color: #fff;
    margin: 0;
    padding: 10px;
    text-align: center;
}

/* ESTILO DA ENGRENAGEM */
.config-container {
    display: flex;
    justify-content: flex-end;
    padding: 5px;
}
.btn-engrenagem {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    transition: transform 0.3s;
}
.btn-engrenagem:hover { transform: rotate(45deg); }

.input-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #444;
    background: #222;
    color: #fff;
}

/* ESTILO PADRÃO DE BOTÕES */
.btn-estilo-padrao {
    background: linear-gradient(90deg, #1a1a1a, #2a2a2a);
    border: 1px solid #444;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.control-btn {
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
}

.team-label {
    margin: 10px 0 5px 0;
    font-weight: bold;
    color: #aaa;
}

.radar-container {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.radar-button {
    width: 80px;
    height: 80px;
    border-radius: 14px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding-top: 10px;
}

/* IMAGENS NOS BOTÕES - 35x35px */
.btn-icon-img {
    width: 35px !important; 
    height: 35px !important;
    min-width: 35px;
    min-height: 35px;
    object-fit: contain;
    pointer-events: none;
    margin-top: 5px;
}

/* TEXTO DOS BOTÕES - CENTRALIZADO */
.btn-text {
    position: absolute;
    top: 6px;
    width: 100%;
    left: 0;
    text-align: center;
    font-size: 9px;
    text-transform: uppercase;
    color: #bbb;
    pointer-events: none;
    letter-spacing: 0.5px;
}

.radar-button.editando {
    border: 2px dashed #007bff !important;
    opacity: 0.8;
}

.event-list {
    max-width: 400px;
    margin: 20px auto;
}

.event-card {
    display: flex;
    align-items: center;
    padding: 8px;
    margin-bottom: 8px;
    border-radius: 8px;
    background: linear-gradient(90deg, #1a1a1a, #2a2a2a);
    border: 1px solid #333;
    text-align: left;
}

.radar-list-img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    margin-right: 5px;
}
</style>
</head>

<body>

<div class="config-container">
    <button class="btn-engrenagem" onclick="toggleEdicao()">⚙️</button>
</div>

<div class="input-container">
    <input id="teamA" placeholder="Casa">
    <input id="teamB" placeholder="Fora">
</div>

<div class="controls">
    <button class="control-btn btn-estilo-padrao" onclick="limparTudo()">Limpar</button>
    <button class="control-btn btn-estilo-padrao" onclick="desfazerUltimo()">Desfazer</button>
    <button class="control-btn btn-estilo-padrao" onclick="abrirJanela()">Radar</button>
    <button class="control-btn btn-estilo-padrao" onclick="addTempo()">Tempo</button>
</div>

<div class="team-label">Casa</div>
<div class="radar-container" id="container-casa">
    <button class="radar-button btn-estilo-padrao" onclick="add('Meta','A')"><span class="btn-text">Meta</span><img src="meta.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Offside','A')"><span class="btn-text">Offside</span><img src="offside.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Lateral','A')"><span class="btn-text">Lateral</span><img src="lateral.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Canto','A')"><span class="btn-text">Canto</span><img src="canto.png" class="btn-icon-img"></button>
    
    <button class="radar-button btn-estilo-padrao" onclick="add('Goleiro','A')"><span class="btn-text">Goleiro</span><img src="goleiro.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Defesa','A')"><span class="btn-text">Defesa</span><img src="defesa-casa.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Ataque','A')"><span class="btn-text">Ataque</span><img src="ataque-casa.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Perigoso','A')"><span class="btn-text">Perigoso</span><img src="perigoso-casa.png" class="btn-icon-img"></button>
    
    <button class="radar-button btn-estilo-padrao" onclick="add('Parado','A')"><span class="btn-text">Parado</span><img src="parado.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Substituição','A')"><span class="btn-text">Sub</span><img src="sub.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Falta','A')"><span class="btn-text">Falta</span><img src="falta.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao" onclick="add('Gol!','A')"><span class="btn-text">Gol!</span><img src="bola.png" class="btn-icon-img"></button>
</div>

<div class="team-label">Fora</div>
<div class="radar-container" id="container-fora">
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Meta','B')"><span class="btn-text">Meta</span><img src="meta.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Offside','B')"><span class="btn-text">Offside</span><img src="offside.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Lateral','B')"><span class="btn-text">Lateral</span><img src="lateral.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Canto','B')"><span class="btn-text">Canto</span><img src="canto.png" class="btn-icon-img"></button>
    
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Goleiro','B')"><span class="btn-text">Goleiro</span><img src="goleiro.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Defesa','B')"><span class="btn-text">Defesa</span><img src="defesa-fora.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Ataque','B')"><span class="btn-text">Ataque</span><img src="ataque-fora.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Perigoso','B')"><span class="btn-text">Perigoso</span><img src="perigoso-fora.png" class="btn-icon-img"></button>
    
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Parado','B')"><span class="btn-text">Parado</span><img src="parado.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Substituição','B')"><span class="btn-text">Sub</span><img src="sub.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Falta','B')"><span class="btn-text">Falta</span><img src="falta.png" class="btn-icon-img"></button>
    <button class="radar-button btn-estilo-padrao fora-btn" onclick="add('Gol!','B')"><span class="btn-text">Gol!</span><img src="bola.png" class="btn-icon-img"></button>
</div>

<div id="eventList" class="event-list"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const iconesBase = {
    Meta:'meta.png', Offside:'offside.png', Lateral:'lateral.png', Canto:'canto.png',
    Goleiro:'goleiro.png', Parado:'parado.png', Substituição:'sub.png', Falta:'falta.png', 
    'Gol!':'bola.png', Tempo:'⏱️'
};

let editMode = false;
let draggedItem = null;
let janelaRadar = null;

function toggleEdicao() {
    editMode = !editMode;
    document.querySelectorAll('.radar-button').forEach(btn => {
        btn.classList.toggle('editando', editMode);
        btn.setAttribute('draggable', editMode);
    });
}

// Drag and Drop
document.querySelectorAll('.radar-container').forEach(container => {
    container.addEventListener('dragstart', e => { if(editMode) draggedItem = e.target.closest('.radar-button'); });
    container.addEventListener('dragover', e => { if(editMode) e.preventDefault(); });
    container.addEventListener('drop', e => {
        if(!editMode) return;
        const target = e.target.closest('.radar-button');
        if(target && target !== draggedItem) {
            const children = [...container.children];
            const fromIdx = children.indexOf(draggedItem);
            const toIdx = children.indexOf(target);
            if(fromIdx < toIdx) container.insertBefore(draggedItem, target.nextSibling);
            else container.insertBefore(draggedItem, target);
        }
    });
});

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyCz6YUc4GHbAHu5neKFUXOy2geO8gICUXo",
  authDomain: "radin-radar.firebaseapp.com",
  databaseURL: "https://radin-radar-default-rtdb.firebaseio.com",
  projectId: "radin-radar"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function add(evento, time){
    if(editMode) return;
    const tA = document.getElementById('teamA').value || "Casa";
    const tB = document.getElementById('teamB').value || "Fora";
    const team = time === 'A' ? tA : tB;
    const ref = db.ref('eventos');
    
    if(evento !== 'Parado'){
        ref.orderByChild('team').equalTo(team).once('value', snap => {
            snap.forEach(c => { if(c.val().evento === 'Parado') c.ref.remove(); });
            ref.push({ evento, team, teamType: time, timestamp: Date.now() });
        });
    } else { 
        ref.push({ evento, team, teamType: time, timestamp: Date.now() }); 
    }
}

function addTempo() { db.ref('eventos').push({ evento:'Tempo', team:'', timestamp: Date.now() }); }

// Atualização em Tempo Real
db.ref('eventos').on('value', snap => {
    const list = document.getElementById('eventList');
    list.innerHTML = '';
    const data = snap.val();
    const teamA_Name = document.getElementById('teamA').value || "Casa";

    if (data) {
        for (let k in data){
            const e = data[k];
            const div = document.createElement('div');
            div.className = 'event-card';
            let img = iconesBase[e.evento];
            
            if(['Defesa', 'Ataque', 'Perigoso'].includes(e.evento)){
                const sufixo = (e.team === teamA_Name || e.teamType === 'A') ? '-casa.png' : '-fora.png';
                img = e.evento.toLowerCase() + sufixo;
            }

            const iconHTML = (img && img.includes('.png')) 
                ? `<img src="${img}" class="radar-list-img">` 
                : `<span>${img || '•'}</span>`;
                
            div.innerHTML = `${iconHTML} ${e.evento === 'Tempo' ? 'Tempo' : e.evento + ' ' + e.team}`;
            list.prepend(div);
        }
    }
    atualizarJanelaExterna();
});

// MODO JANELA
function abrirJanela(){
    if(!janelaRadar || janelaRadar.closed){
        janelaRadar = window.open("", "RadarWindow", "width=350,height=600");
        
        janelaRadar.document.write(`
            <html>
            <head>
                <title>Radar Externo</title>
                <style>
                    body { background: #111; color: #fff; font-family: Arial, sans-serif; padding: 15px; margin: 0; }
                    .event-card { 
                        display: flex; align-items: center; padding: 8px; margin-bottom: 5px; 
                        border-radius: 8px; background: linear-gradient(90deg, #1a1a1a, #2a2a2a); 
                        border: 1px solid #333; font-size: 14px;
                    }
                    .radar-list-img { width: 18px; height: 18px; object-fit: contain; margin-right: 7px; }
                </style>
            </head>
            <body>
                <div id="lista-externa"></div>
            </body>
            </html>
        `);
        janelaRadar.document.close(); 
    }
    setTimeout(atualizarJanelaExterna, 500);
}

function atualizarJanelaExterna(){
    if(janelaRadar && !janelaRadar.closed){
        const conteudoOriginal = document.getElementById('eventList').innerHTML;
        const containerExterno = janelaRadar.document.getElementById('lista-externa');
        if (containerExterno) {
            containerExterno.innerHTML = conteudoOriginal;
        }
    }
}

function limparTudo(){ db.ref('eventos').remove(); }
function desfazerUltimo(){ db.ref('eventos').orderByChild('timestamp').limitToLast(1).once('value', s => s.forEach(c => c.ref.remove())); }
</script>

</body>
</html>
