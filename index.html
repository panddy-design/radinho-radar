<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Voice v3.1</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 350px; margin: auto; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .scout { background: #007bff; color: white; }
        .ouvinte { background: #28a745; color: white; }
        .teste { background: #ffc107; color: black; display: none; }
        #status { color: #ffc107; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Rádio Scout v3.1</h2>
        <div id="status">SISTEMA OFFLINE</div>

        <button class="btn scout" id="btnScout" onclick="iniciar('host')">INICIAR SCOUT (FALAR)</button>
        <button class="btn ouvinte" id="btnOuvinte" onclick="iniciar('audience')">INICIAR OUVINTE (OUVIR)</button>
        
        <button class="btn teste" id="btnTeste" onclick="ativarSom()">CLIQUE AQUI PARA ATIVAR O SOM</button>
        
        <button class="btn" style="background:#444; color:#fff;" onclick="location.reload()">RESETAR</button>
    </div>

    <script>
        var appId = "9b20225ca2a5400f9a98b7c20a1f994d";
        var canal = "sala_scout_pro";
        var client = AgoraRTC.createClient({ mode: "live", codec: "opus" });
        var mic = null;

        async function iniciar(papel) {
            try {
                await client.setClientRole(papel);
                await client.join(appId, canal, null, null);
                
                document.getElementById('status').innerText = "CONECTADO!";
                document.getElementById('btnScout').style.display = 'none';
                document.getElementById('btnOuvinte').style.display = 'none';

                if (papel === 'host') {
                    mic = await AgoraRTC.createMicrophoneAudioTrack({ encoderConfig: "high_quality_stereo" });
                    await client.publish(mic);
                    document.getElementById('status').innerText = "VOCÊ ESTÁ TRANSMITINDO";
                } else {
                    document.getElementById('status').innerText = "OUVINDO (AGUARDANDO ÁUDIO)";
                    document.getElementById('btnTeste').style.display = 'block';
                }

                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                        document.getElementById('status').innerText = "RECEBENDO ÁUDIO AO VIVO!";
                        document.getElementById('status').style.color = "#28a745";
                    }
                });

            } catch (e) {
                alert("Erro: " + e.message);
            }
        }

        // Função extra para garantir que o som saia no navegador
        function ativarSom() {
            AgoraRTC.checkAudioAutoplayStatus(true).then(() => {
                alert("Som ativado! Se houver alguém falando, você deve ouvir agora.");
            });
        }
    </script>
</body>
</html>
