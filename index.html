<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rádio Scout - Jitsi Mode</title>
    <script src="https://8x8.vc/external_api.js"></script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .scout { background: #007bff; color: white; }
        .ouvinte { background: #28a745; color: white; }
        #jitsi-container { width: 100%; height: 0; overflow: hidden; } /* Escondido pois só queremos o áudio */
        #status { color: #ffcc00; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>RÁDIO SCOUT v4.0</h2>
        <div id="status">SISTEMA JITSI PRONTO</div>

        <button class="btn scout" onclick="iniciarRadio(true)">SOU SCOUT (FALAR)</button>
        <button class="btn ouvinte" onclick="iniciarRadio(false)">SOU OUVINTE (OUVIR)</button>
        
        <button class="btn" style="background:#444;" onclick="location.reload()">REINICIAR</button>
    </div>

    <div id="jitsi-container"></div>

    <script>
        let api = null;

        function iniciarRadio(isScout) {
            const domain = "8x8.vc"; // Servidor estável do Jitsi
            const options = {
                roomName: "SalaScoutExclusiva_123456", // Mude esse nome para algo único
                width: "100%",
                height: 0, // Mantém escondido
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: {
                    startWithAudioMuted: !isScout, // Se for ouvinte, entra mudo
                    startWithVideoMuted: true,     // Rádio, sem vídeo
                    prejoinPageEnabled: false      // Entra direto
                },
                interfaceConfigOverwrite: {
                    TOOLBAR_BUTTONS: [] // Remove botões
                }
            };

            document.getElementById('status').innerText = isScout ? "TRANSMITINDO..." : "OUVINDO...";
            document.getElementById('status').style.color = isScout ? "#007bff" : "#28a745";

            // Inicializa a rádio
            api = new JitsiMeetExternalAPI(domain, options);

            // Se for ouvinte, garante que o som não está mutado localmente
            if (!isScout) {
                api.executeCommand('muteAudio', true); // Garante que o ouvinte não fale
                alert("Conectado! Você ouvirá o Scout assim que ele falar.");
            }
        }
    </script>
</body>
</html>
