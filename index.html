<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Voice v2.9</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 50px; }
        .btn { padding: 20px; width: 100%; max-width: 300px; margin: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .scout { background: #007bff; color: #fff; }
        .ouvinte { background: #28a745; color: #fff; }
        #log { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Scout Voice v2.9</h2>
    <p id="status">Status: Aguardando clique...</p>

    <button class="btn scout" onclick="rodar('host')">INICIAR COMO SCOUT</button>
    <button class="btn ouvinte" onclick="rodar('audience')">INICIAR COMO OUVINTE</button>

    <div id="log">Logs de conexão aparecerão aqui...</div>

    <script>
        const appID = "9b20225ca2a5400f9a98b7c20a1f994d";
        const canal = "sala_scout_pro";
        let client = AgoraRTC.createClient({ mode: "live", codec: "opus" });

        async function rodar(role) {
            try {
                document.getElementById('status').innerText = "Status: Conectando...";
                await client.setClientRole(role);
                
                // Tenta entrar na sala
                await client.join(appID, canal, null, null);
                document.getElementById('status').innerText = "Status: CONECTADO (" + role + ")";

                if (role === 'host') {
                    const mic = await AgoraRTC.createMicrophoneAudioTrack();
                    await client.publish(mic);
                    document.getElementById('status').innerText = "Status: TRANSMITINDO AO VIVO!";
                }

                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                        document.getElementById('status').innerText = "Status: OUVINDO ÁUDIO...";
                    }
                });

            } catch (err) {
                document.getElementById('status').innerText = "ERRO FATAL";
                document.getElementById('log').innerText = "Erro: " + err.message + " | Causa: " + err.code;
                alert("ERRO: " + err.message);
            }
        }
    </script>
</body>
</html>
