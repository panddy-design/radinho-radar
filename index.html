<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Radio v12</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body { background:#000; color:#fff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
.card { background:#111; padding:30px; border-radius:20px; text-align:center; width:320px; }
.btn { width:100%; padding:15px; margin:10px 0; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
.scout { background:#007bff; color:#fff; }
.ouvinte { background:#28a745; color:#fff; }
</style>
</head>

<body>

<div class="card">
<h2>Scout Radio</h2>
<p id="status">Aguardando...</p>

<button class="btn scout" onclick="startScout()">SCOUT (FALAR)</button>
<button class="btn ouvinte" onclick="startListener()">OUVINTE (OUVIR)</button>
</div>

<script>
let peer;
let conn;
let myId = "sala-scout-123"; // FIXO (tipo canal de rádio)

// SCOUT (quem fala)
async function startScout() {
    document.getElementById('status').innerText = "Iniciando transmissão...";

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    peer = new Peer(myId);

    peer.on('call', call => {
        call.answer(stream);
        document.getElementById('status').innerText = "Ouvinte conectado";
    });

    document.getElementById('status').innerText = "Aguardando ouvintes...";
}

// OUVINTE (quem escuta)
function startListener() {
    document.getElementById('status').innerText = "Conectando...";

    peer = new Peer();

    peer.on('open', id => {
        const call = peer.call(myId, null);

        call.on('stream', stream => {
            const audio = new Audio();
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.play().catch(()=>{});

            document.getElementById('status').innerText = "Áudio ao vivo 🔊";
        });
    });
}
</script>

</body>
</html>
