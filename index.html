<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Radio v11 (WebRTC direto)</title>
<style>
body { background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
.card { background:#111; padding:30px; border-radius:20px; border:2px solid #28a745; width:320px; text-align:center; }
.btn { width:100%; padding:18px; margin:10px 0; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
.scout { background:#007bff; color:#fff; }
.ouvinte { background:#28a745; color:#fff; }
#status { margin-top:10px; font-size:14px; color:#aaa; }
</style>
</head>
<body>

<div class="card">
<h2>Scout Radio v11</h2>
<div id="status">Aguardando...</div>

<button class="btn scout" onclick="startScout()">SCOUT (FALAR)</button>
<button class="btn ouvinte" onclick="startListener()">OUVINTE (OUVIR)</button>
</div>

<script>
let localStream;
let peer;
let ws;

// servidor websocket simples (você precisa rodar um depois — explico abaixo)
const WS_URL = "ws://localhost:3000";

function log(msg){ document.getElementById('status').innerText = msg; }

async function startScout() {
    log("Pegando microfone...");

    localStream = await navigator.mediaDevices.getUserMedia({ audio:true });

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        log("Conectado - aguardando ouvinte...");
    };

    ws.onmessage = async (msg) => {
        const data = JSON.parse(msg.data);

        if (data.answer) {
            await peer.setRemoteDescription(data.answer);
            log("Transmitindo áudio");
        }
    };

    peer = new RTCPeerConnection();

    localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);

    ws.onopen = () => {
        ws.send(JSON.stringify({ offer }));
    };
}

async function startListener() {
    log("Conectando...");

    ws = new WebSocket(WS_URL);

    ws.onmessage = async (msg) => {
        const data = JSON.parse(msg.data);

        if (data.offer) {
            peer = new RTCPeerConnection();

            peer.ontrack = (event) => {
                const audio = document.createElement('audio');
                audio.srcObject = event.streams[0];
                audio.autoplay = true;
                audio.play().catch(()=>{});
                log("Áudio recebendo");
            };

            await peer.setRemoteDescription(data.offer);

            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);

            ws.send(JSON.stringify({ answer }));
        }
    };
}
</script>

</body>
</html>
