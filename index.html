<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Voice - Sala de Áudio</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    
    <style>
        /* MARCADOR DE VERSÃO PARA CACHE */
        .version-tag {
            background: #007bff;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px;
            text-align: center;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial, sans-serif; 
            background: #0b0b0b; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }
        .container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 350px;
            margin-top: 20px;
        }
        h2 { margin-bottom: 20px; color: #007bff; }
        .status { margin-bottom: 20px; font-size: 14px; color: #888; font-weight: bold; }
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .join-btn { background: #28a745; color: white; }
        .join-btn:active { transform: scale(0.98); }
        .leave-btn { background: #dc3545; color: white; }
        #user-list { margin-top: 20px; font-size: 12px; text-align: left; border-top: 1px solid #333; padding-top: 10px; color: #aaa; }
        #count { color: #007bff; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="version-tag">VERSÃO ATUAL: v2.2 (VOZ ATIVA)</div>

    <div class="container">
        <h2>Scout Voice</h2>
        <div id="status" class="status">Pronto para conectar</div>

        <button id="join" class="btn join-btn">ENTRAR NA SALA</button>
        <button id="leave" class="btn leave-btn" style="display:none;">SAIR DA SALA</button>

        <div id="user-list">Ouvintes na sala: <span id="count">0</span></div>
    </div>

    <script>
        const options = {
            appId: "9b20225ca2a5400f9a98b7c20a1f994d",
            channel: "sala_scout_pro",
            token: null, 
            uid: null
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "opus" });
        let localTracks = { audioTrack: null };
        let remoteUsers = {}; 

        const joinBtn = document.getElementById('join');
        const leaveBtn = document.getElementById('leave');
        const statusText = document.getElementById('status');
        const countText = document.getElementById('count');

        function updateCounter() {
            countText.innerText = Object.keys(remoteUsers).length;
        }

        async function join() {
            try {
                statusText.innerText = "Tentando conectar...";
                
                // Entrar no canal
                options.uid = await client.join(options.appId, options.channel, options.token, null);
                
                // Feedback tátil para saber que o clique funcionou
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

                // Criar áudio
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack({
                    encoderConfig: "high_quality" 
                });

                await client.publish(localTracks.audioTrack);
                
                statusText.innerText = "CONECTADO!";
                statusText.style.color = "#28a745";
                joinBtn.style.display = "none";
                leaveBtn.style.display = "block";

            } catch (error) {
                console.error(error);
                // ALERTA PARA VOCÊ VER NO CELULAR
                alert("ERRO NO CELULAR: " + error.message);
                statusText.innerText = "Erro: " + error.code;
            }
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                remoteUsers[user.uid] = user; 
                user.audioTrack.play();
                updateCounter();
            }
        });

        client.on("user-left", (user) => {
            delete remoteUsers[user.uid];
            updateCounter();
        });

        async function leave() {
            for (let trackName in localTracks) {
                let track = localTracks[trackName];
                if (track) {
                    track.stop();
                    track.close();
                    localTracks[trackName] = null;
                }
            }
            await client.leave();
            remoteUsers = {};
            updateCounter();
            
            statusText.innerText = "Desconectado";
            statusText.style.color = "#888";
            joinBtn.style.display = "block";
            leaveBtn.style.display = "none";
        }

        joinBtn.onclick = join;
        leaveBtn.onclick = leave;
    </script>
</body>
</html>
