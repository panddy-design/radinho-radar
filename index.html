<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Radio Daily</title>

<script src="https://unpkg.com/@daily-co/daily-js"></script>

<style>
body { background:#000; color:#fff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
.card { background:#111; padding:30px; border-radius:20px; text-align:center; width:320px; }
.btn { width:100%; padding:15px; margin:10px 0; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }
.scout { background:#007bff; color:#fff; }
.ouvinte { background:#28a745; color:#fff; }
</style>
</head>

<body>

<div class="card">
<h2>Scout Radio 🔊</h2>
<p id="status">Aguardando...</p>

<button class="btn scout" onclick="entrar(true)">SCOUT (FALAR)</button>
<button class="btn ouvinte" onclick="entrar(false)">OUVINTE (OUVIR)</button>
</div>

<script>
const ROOM_URL = "COLE_AQUI_SUA_URL_DAILY";

let call;

async function entrar(isScout) {
    document.getElementById('status').innerText = "Conectando...";

    call = DailyIframe.createCallObject();

    await call.join({
        url: ROOM_URL
    });

    if (isScout) {
        // Scout fala
        await call.setLocalAudio(true);
        document.getElementById('status').innerText = "Transmitindo 🎙️";
    } else {
        // Ouvinte só escuta
        await call.setLocalAudio(false);
        document.getElementById('status').innerText = "Ouvindo 🔊";
    }

    // Receber áudio
    call.on('participant-updated', ev => {
        const p = ev.participant;

        if (p.audio && p.audioTrack) {
            const audio = new Audio();
            audio.srcObject = new MediaStream([p.audioTrack]);
            audio.autoplay = true;
            audio.play().catch(()=>{});
        }
    });
}
</script>

</body>
</html>
