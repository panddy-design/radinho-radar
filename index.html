<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Radio Firebase</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
body {
    background:#000;
    color:#fff;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.card {
    background:#111;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:320px;
}
button {
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
.scout { background:#007bff; color:#fff; }
.ouvinte { background:#28a745; color:#fff; }
</style>
</head>

<body>

<div class="card">
<h2>Scout Radio 🔊 v13.1</h2>
<p id="status">Aguardando...</p>

<button class="scout" onclick="startScout()">SCOUT (FALAR)</button>
<button class="ouvinte" onclick="startListener()">OUVINTE (OUVIR)</button>
</div>

<script>
// 🔥 COLE SEUS DADOS AQUI
const firebaseConfig = {
    apiKey: "AIzaSyBIzfmq-5XDsQUJX8cSf5Uo0D41MUiTIRw",
    authDomain: "scout-radio-5964e.firebaseapp.com",
    projectId: "scout-radio-5964e",
    storageBucket: "scout-radio-5964e.firebasestorage.app",
};

// INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let mediaRecorder;

// 🎙️ SCOUT
async function startScout() {
    document.getElementById("status").innerText = "Transmitindo...";

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = async (event) => {
        const blob = event.data;

        const ref = storage.ref().child("audio/" + Date.now() + ".webm");
        await ref.put(blob);

        const url = await ref.getDownloadURL();

        await db.collection("radio").doc("live").set({
            audio: url,
            time: Date.now()
        });
    };

    mediaRecorder.start(2000); // envia a cada 2s
}

// 🔊 OUVINTE
function startListener() {
    document.getElementById("status").innerText = "Ouvindo...";

    db.collection("radio").doc("live")
    .onSnapshot(doc => {
        const data = doc.data();
        if (!data) return;

        const audio = new Audio(data.audio);
        audio.play().catch(() => {});
    });
}
</script>

</body>
</html>
