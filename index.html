<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Voice v3.0</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: #fff; text-align: center; padding: 40px 20px; }
        .container { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 350px; margin: auto; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .scout { background: #007bff; color: white; }
        .ouvinte { background: #28a745; color: white; }
        #status { margin-top: 20px; color: #ffc107; font-weight: bold; }
        .version { font-size: 10px; color: #444; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Scout Voice</h2>
        <div id="status">SISTEMA PRONTO</div>

        <button class="btn scout" onclick="conectar('host')">SOU SCOUT (FALAR)</button>
        <button class="btn ouvinte" onclick="conectar('audience')">SOU OUVINTE (OUVIR)</button>
        
        <button id="sair" class="btn" style="background:#333; color:#888; display:none;" onclick="location.reload()">SAIR / RESET</button>
    </div>

    <div class="version">VERSÃO v3.0 - STABLE</div>

    <script>
        // Configurações Globais
        var appId = "9b20225ca2a5400f9a98b7c20a1f994d";
        var canal = "sala_scout_pro";
        var rtcClient = null;
        var localMic = null;

        // Inicializa o cliente assim que a página carrega
        window.onload = function() {
            try {
                rtcClient = AgoraRTC.createClient({ mode: "live", codec: "opus" });
                console.log("Sistema de áudio inicializado.");
            } catch (e) {
                console.error("Erro ao carregar SDK:", e);
            }
        };

        async function conectar(papel) {
            if (!rtcClient) {
                alert("O sistema ainda está carregando, aguarde 2 segundos.");
                return;
            }

            try {
                document.getElementById('status').innerText = "CONECTANDO...";
                
                // Configura se é quem fala (host) ou quem ouve (audience)
                await rtcClient.setClientRole(papel);
                
                // Entra no canal
                await rtcClient.join(appId, canal, null, null);

                if (papel === 'host') {
                    // Ativa Microfone
                    localMic = await AgoraRTC.createMicrophoneAudioTrack({ encoderConfig: "high_quality_stereo" });
                    await rtcClient.publish(localMic);
                    document.getElementById('status').innerText = "VOCÊ ESTÁ TRANSMITINDO";
                    document.getElementById('status').style.color = "#007bff";
                } else {
                    document.getElementById('status').innerText = "OUVINDO AGORA...";
                    document.getElementById('status').style.color = "#28a745";
                }

                // Esconde botões iniciais e mostra o de sair
                document.querySelectorAll('.btn').forEach(b => b.style.display = 'none');
                document.getElementById('sair').style.display = 'block';

                // Lógica para receber áudio (essencial para o ouvinte)
                rtcClient.on("user-published", async (user, mediaType) => {
                    await rtcClient.subscribe(user, mediaType);
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                        document.getElementById('status').innerText = "ÁUDIO RECEBIDO AO VIVO";
                    }
                });

            } catch (err) {
                console.error(err);
                alert("Erro de conexão: " + err.message);
                document.getElementById('status').innerText = "FALHA NA CONEXÃO";
            }
        }
    </script>
</body>
</html>
