<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Radio v6.0</title>
    <script src="https://8x8.vc/external_api.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 40px; border-radius: 30px; border: 2px solid #007bff; width: 340px; }
        .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .scout { background: #007bff; color: white; }
        .ouvinte { background: #28a745; color: white; }
        .fix { background: #dc3545; color: white; display: none; margin-top: 20px; }
        #status { color: #ffcc00; margin-bottom: 20px; font-weight: bold; }
        #jitsi-container { position: absolute; top: -5000px; } /* Esconde o vídeo mas mantém o áudio vivo */
    </style>
</head>
<body>

    <div class="card">
        <h2>SCOUT RADIO v6.0</h2>
        <div id="status">SISTEMA PRONTO</div>

        <div id="controles">
            <button class="btn scout" onclick="conectar(true)">LIGAR MICROFONE (SCOUT)</button>
            <button class="btn ouvinte" onclick="conectar(false)">ATIVAR RECEPÇÃO (OUVINTE)</button>
        </div>

        <button id="btnFix" class="btn fix" onclick="forcarSom()">NÃO OUÇO NADA? CLIQUE AQUI</button>

        <p style="font-size: 10px; color: #444; margin-top: 20px;">Se o som falhar, verifique o Mixer de Volume do Windows.</p>
    </div>

    <div id="jitsi-container"></div>

    <script>
        let jitsiApi = null;

        function conectar(isScout) {
            const options = {
                roomName: "SALA_SCOUT_UNICA_2024_001", // Mantenha este nome igual em ambos
                parentNode: document.querySelector('#jitsi-container'),
                configOverwrite: {
                    startWithAudioMuted: !isScout,
                    startWithVideoMuted: true,
                    prejoinPageEnabled: false,
                    enableNoAudioDetection: true,
                    enableNoVideoDetection: true
                }
            };

            jitsiApi = new JitsiMeetExternalAPI("8x8.vc", options);

            document.getElementById('status').innerText = isScout ? "TRANSMITINDO..." : "RECEPÇÃO LIGADA";
            document.getElementById('controles').style.display = 'none';
            
            if(!isScout) {
                document.getElementById('btnFix').style.display = 'block';
                // Alerta para garantir interação do usuário (necessário para som)
                alert("Conectado! Aguarde o Scout falar. Se ficar mudo, use o botão vermelho.");
            }
        }

        function forcarSom() {
            if (jitsiApi) {
                // Tenta forçar o navegador a dar "Play" no áudio remoto
                jitsiApi.executeCommand('toggleAudio');
                setTimeout(() => {
                    jitsiApi.executeCommand('toggleAudio');
                    alert("Tentativa de reset de áudio enviada. Aumente o volume do dispositivo!");
                }, 500);
            }
        }
    </script>
</body>
</html>
